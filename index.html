<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pitchr Launch Strategy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      #root > main {
        padding-left: 0.75rem !important;
        padding-right: 0.75rem !important;
      }

      @media (min-width: 768px) {
        #root > main {
          padding-left: 1rem !important;
          padding-right: 1rem !important;
        }
      }

      #root > main > div {
        max-width: calc(100vw - 32px) !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function () {
        const targetRows = {
          June: ["June", "15-30", "3", "+150"],
          July: ["July", "15-30", "7", "+175"],
          August: ["August", "20-30", "10", "+175"],
          "Total Q1": ["Total Q1", "50-90", "20", "+500"]
        };

        function patchKpiRows() {
          const divs = Array.from(document.querySelectorAll("div"));
          divs.forEach((cell) => {
            const label = cell.textContent.trim();
            const values = targetRows[label];
            if (!values || !cell.parentElement) return;
            const row = cell.parentElement;
            if (row.children.length < 4) return;
            if (!Array.from(row.children).some((child) => child.textContent.trim() === "150+" || child.textContent.trim() === "175+" || child.textContent.trim() === "500+")) return;
            values.forEach((value, index) => {
              if (row.children[index]) row.children[index].textContent = value;
            });
          });
        }

        const observer = new MutationObserver(patchKpiRows);
        observer.observe(document.documentElement, { childList: true, subtree: true });
        window.addEventListener("load", patchKpiRows);
        setInterval(patchKpiRows, 500);
      })();
    </script>
  </body>
</html>
