<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pitchr Launch Strategy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      #root > main {
        padding-left: 0.75rem !important;
        padding-right: 0.75rem !important;
      }

      @media (min-width: 768px) {
        #root > main {
          padding-left: 1rem !important;
          padding-right: 1rem !important;
        }
      }

      #root > main > div {
        max-width: calc(100vw - 32px) !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (function () {
        const targetRows = {
          June: ["June", "15-30", "3", "+150"],
          July: ["July", "15-30", "7", "+175"],
          August: ["August", "20-30", "10", "+175"],
          "Total Q1": ["Total Q1", "50-90", "20", "+500"]
        };

        const dueOrder = {
          "Mid-May": 10,
          "Late May": 20,
          "May 27": 27,
          "Before June 1": 29,
          "June 1": 31,
          "June 8": 38,
          "June": 45,
          "Weekly from June": 50,
          "Weekly June-August": 55,
          "Monthly": 60,
          "Mid-July": 70
        };

        function patchKpiRows() {
          const divs = Array.from(document.querySelectorAll("div"));
          divs.forEach((cell) => {
            const label = cell.textContent.trim();
            const values = targetRows[label];
            if (!values || !cell.parentElement) return;
            const row = cell.parentElement;
            if (row.children.length < 4) return;
            if (!Array.from(row.children).some((child) => child.textContent.trim() === "150+" || child.textContent.trim() === "175+" || child.textContent.trim() === "500+")) return;
            values.forEach((value, index) => {
              if (row.children[index]) row.children[index].textContent = value;
            });
          });
        }

        function sortProductionSchedule() {
          const candidates = Array.from(document.querySelectorAll("div.grid"));
          const header = candidates.find((el) => {
            const cells = Array.from(el.children).map((child) => child.textContent.trim());
            return cells.length === 5 && cells[0] === "Channel" && cells[1] === "Deliverable" && cells[2] === "Detail" && cells[3] === "Due" && cells[4] === "Owner";
          });
          if (!header || !header.parentElement) return;

          const table = header.parentElement;
          const rows = Array.from(table.children).slice(1).filter((row) => row.children && row.children.length === 5);
          if (rows.length < 2) return;

          const sorted = [...rows].sort((a, b) => {
            const dueA = a.children[3].textContent.trim();
            const dueB = b.children[3].textContent.trim();
            return (dueOrder[dueA] || 999) - (dueOrder[dueB] || 999);
          });

          const isAlreadySorted = rows.every((row, index) => row === sorted[index]);
          if (isAlreadySorted) return;
          sorted.forEach((row) => table.appendChild(row));
        }

        function patchPage() {
          patchKpiRows();
          sortProductionSchedule();
        }

        const observer = new MutationObserver(patchPage);
        observer.observe(document.documentElement, { childList: true, subtree: true });
        window.addEventListener("load", patchPage);
        setInterval(patchPage, 500);
      })();
    </script>
  </body>
</html>
